<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منذر | تصميم الزجاج الناري الفخم</title>
    <style>
        body {
            margin: 0;
            /* خلفية متدرجة فخمة بدلاً من السوداء */
            background: linear-gradient(135deg, #050505 0%, #200101 50%, #050505 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { display: block; filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.2)); }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
let textPoints = [];
let timer = 0;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particleCount = 4000; // عدد مناسب للحجم الكبير الجديد
const textToDisplay = "هبوو";

class Particle {
    constructor(isText) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = this.x;
        this.destY = this.y;
        this.isText = isText;
        
        // تكبير حجم الكرات كما طلبت
        this.size = isText ? (Math.random() * 3 + 2.5) : (Math.random() * 2.5 + 1.5);
        
        this.ease = 0.20 + Math.random() * 0.02;
        this.vx = 0;
        this.vy = 0;
        this.friction = 0.92;
    }

    draw() {
        // تأثير الكرة الزجاجية (تدرج مع لمعة بيضاء)
        let g = ctx.createRadialGradient(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.1, this.x, this.y, this.size);
        
        if (this.isText) {
            g.addColorStop(0, '#ffffff'); // لمعة الزجاج من الداخل
            g.addColorStop(0.2, '#ff4d4d'); 
            g.addColorStop(1, '#660000');
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0000";
        } else {
            g.addColorStop(0, '#ff1a1a'); 
            g.addColorStop(0.5, '#800000');
            g.addColorStop(1, '#2a0000');
            ctx.shadowBlur = 0;
        }

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        
        // إضافة طبقة لمعة خارجية خفيفة لتعزيز شكل الزجاج
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    update() {
        // حركة نارية انسيابية
        let drift = Math.sin(Date.now() * 0.009 + this.x) * 0.5;
        this.vx += (this.destX - this.x) * this.ease + drift;
        this.vy += (this.destY - this.y) * this.ease;
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;
    }
}

function drawBackground() {
    // رسم هالة ضوئية زجاجية خلف القلب
    let radialG = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, 500);
    radialG.addColorStop(0, 'rgba(60, 0, 0, 0.3)');
    radialG.addColorStop(0.5, 'rgba(20, 0, 0, 0.1)');
    radialG.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = radialG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function isInsideHeart(x, y, hX, hY, scale) {
    const nx = (x - hX) / scale;
    const ny = -(y - hY) / scale;
    return Math.pow(Math.pow(nx, 2) + Math.pow(ny, 2) - 1, 3) - Math.pow(nx, 2) * Math.pow(ny, 3) < 0;
}

function analyzeText(text) {
    const tempCanvas = document.createElement('canvas');
    const tCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    
    // خط فخم وعريض يتناسب مع الكرات الكبيرة
    tCtx.fillStyle = "white";
    tCtx.font = "bold 200px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    tCtx.textAlign = "center";
    tCtx.textBaseline = "middle";
    tCtx.fillText(text, tempCanvas.width / 2, tempCanvas.height / 2);
    
    const data = tCtx.getImageData(0, 0, canvas.width, canvas.height).data;
    const points = [];
    for (let y = 0; y < canvas.height; y += 6) { // دقة مريحة للكرات الكبيرة
        for (let x = 0; x < canvas.width; x += 6) {
            if (data[(y * canvas.width + x) * 4 + 3] > 128) points.push({ x, y });
        }
    }
    return points;
}

function init() {
    particles = [];
    textPoints = analyzeText(textToDisplay);
    const hX = canvas.width / 2;
    const hY = canvas.height / 2;
    const hScale = 260;

    for (let i = 0; i < particleCount; i++) {
        let isText = i < (particleCount * 0.19);
        let p = new Particle(isText);
        let found = false;
        while (!found) {
            let rx = Math.random() * canvas.width;
            let ry = Math.random() * canvas.height;
            if (isInsideHeart(rx, ry, hX, hY, hScale)) {
                p.destX = rx; p.destY = ry;
                found = true;
            }
        }
        particles.push(p);
    }
}

function triggerText() {
    particles.forEach((p, i) => {
        if (p.isText) {
            let pt = textPoints[i % textPoints.length];
            p.destX = pt.x;
            p.destY = pt.y;
            p.ease = 0.015;
        }
    });
}

function animate() {
    // مسح الشاشة مع ترك أثر بسيط للكرات
    ctx.fillStyle = 'rgba(10, 0, 0, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();

    timer++;
    if (timer === 10) triggerText();

    particles.forEach(p => {
        p.update();
        p.draw();
    });
    
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});

init();
animate();
</script>
</body>
</html>
