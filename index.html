<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة منذر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
/* تنسيقات منصة منذر الإبداعية - النسخة الزجاجية النهائية */
:root {
    --main-bg: #0f172a;
    --post-bg: rgba(0, 0, 0, 0.9); /* خلفية سوداء قاتمة للمنشور */
    --glass-border: rgba(255, 255, 255, 0.3); /* حدود بيضاء زجاجية */
    --neon-blue: #00f2fe;
    --text-main: #ffffff;
    --text-dim: #cbd5e1;
}

* { 
    box-sizing: border-box; 
    transition: all 0.3s ease; 
}

body {
    background: radial-gradient(circle at top, #1e293b, #0f172a, #000000);
    background-attachment: fixed;
    font-family: 'Tajawal', 'Cairo', sans-serif;
    margin: 0;
    color: var(--text-main);
    direction: rtl;
    padding-bottom: 70px; /* مساحة للشريط السفلي */
}

/* الهيدر العلوي */
header {
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(15px);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    border-bottom: 2px solid var(--neon-blue);
    position: sticky;
    top: 0;
    z-index: 1000;
    color: var(--neon-blue);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

.container {
    width: 92%;
    max-width: 500px;
    margin: 20px auto;
}

/* كرت المنشور (البوست) - مقتبس من الصورة التي أرسلتها */
.post {
    background: var(--post-bg);
    border: 2px solid var(--glass-border);
    padding: 22px;
    border-radius: 35px; /* حواف دائرية كبيرة وأنيقة */
    margin-bottom: 25px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
}

/* اسم المستخدم داخل المنشور */
.post-header {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
}

.avatar {
    width: 45px; height: 45px;
    background: linear-gradient(135deg, #00f2fe, #764ba2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; margin-left: 12px;
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
}

/* تكبير حجم خط الردود والمنشورات */
.post-content {
    font-size: 19px; /* حجم خط كبير وواضح */
    line-height: 1.7;
    color: var(--text-dim);
    word-wrap: break-word;
    margin: 15px 0;
}

/* الفاصل الزجاجي بين الردود */
hr {
    border: none;
    height: 1px;
    /* تدرج شفاف يعطي لمعة الزجاج بدلاً من الخط الأبيض الجامد */
    background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin: 15px 0;
}

/* شريط التنقل السفلي */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 2000;
}

.nav-item {
    color: #94a3b8;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: 0.3s;
}

.nav-item i {
    display: block;
    font-size: 22px;
    margin-bottom: 4px;
}

.nav-item:hover, .nav-item.active {
    color: var(--neon-blue);
    text-shadow: 0 0 8px var(--neon-blue);
}

/* تحسين شكل الأزرار والمداخل */
input, textarea {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    outline: none;
    font-size: 16px;
}

button {
    background: linear-gradient(45deg, #00f2fe, #764ba2);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 15px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5);
}
</style>
</head>
<body>

<div id="loader"><div style="text-align:center"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:40px; color:#007bff"></i><p style="color:#007bff; font-weight:bold">جاري التحميل...</p></div></div>

<header id="h-title"> الرئيسيه</header>

<div id="nav" class="nav" style="display:none;">
    <div class="nav-item active" id="n-home" onclick="go('public')"><i class="fa-solid fa-house"></i><span>الرئيسية</span></div>
    <div class="nav-item" id="n-user" onclick="go('private')"><i class="fa-solid fa-user-circle"></i><span>منشوراتي</span></div>
    <div class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i><span>خروج</span></div>
</div>

<div class="container">
    <div id="auth" class="card">
        <h3 id="auth-title" style="text-align:center">دخول </h3>
        <input type="text" id="userName" placeholder="الاسم الكامل" style="display:none;">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button id="btn-main" onclick="handleAuth()">دخول</button>
        <p id="auth-toggle" onclick="toggleAuth()" style="text-align:center; font-size:13px; color:#007bff; margin-top:15px; cursor:pointer;">ليس لديك حساب؟ إنشاء حساب جديد</p>
    </div>

    <div id="main" style="display:none;">
        <div id="p-box" class="card">
            <textarea id="p-txt" placeholder="بماذا تفكر الان؟ " rows="2"></textarea>
<button onclick="post()" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
    <span>نشر الآن</span>
    <i class="fa-solid fa-paper-plane"></i>
</button>        </div>
        <div id="feed"></div>
    </div>
</div>

<script>
    const conf = {
        apiKey: "AIzaSyDat3Y9CFR1ekMPhKjwLka5YOR0sLV3w1k",
        authDomain: "fangre-2026.firebaseapp.com",
        projectId: "fangre-2026",
        storageBucket: "fangre-2026.firebasestorage.app",
        messagingSenderId: "429298728907",
        appId: "1:429298728907:web:701ea37df8547ca70f004e"
    };
    firebase.initializeApp(conf);
    const auth = firebase.auth(), db = firebase.firestore();
    
    let isLoginMode = true, mode = 'public';

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('userName').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('auth-title').innerText = isLoginMode ? "دخول المنصة" : "إنشاء حساب جديد";
        document.getElementById('btn-main').innerText = isLoginMode ? "دخول" : "تسجيل حساب";
        document.getElementById('auth-toggle').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب بالفعل؟ سجل دخولك";
    }

    function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value, n = document.getElementById('userName').value;
        if(isLoginMode) {
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("خطأ: " + err.message));
        } else {
            if(!n) return alert("يرجى كتابة الاسم");
            auth.createUserWithEmailAndPassword(e, p).then(cred => {
                return cred.user.updateProfile({ displayName: n });
            }).then(() => location.reload()).catch(err => alert("خطأ: " + err.message));
        }
    }

    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(u => {
        const ld = document.getElementById('loader');
        if(u) {
            document.getElementById('auth').style.display='none';
            document.getElementById('main').style.display='block';
            document.getElementById('nav').style.display='flex';
            load();
        } else {
            document.getElementById('auth').style.display='block';
            document.getElementById('main').style.display='none';
            document.getElementById('nav').style.display='none';
        }
        setTimeout(() => { ld.style.opacity='0'; setTimeout(()=>ld.style.display='none',500); }, 800);
    });

    function go(m) {
        mode = m;
        document.getElementById('h-title').innerText = m=='public'?'الساحة العامة':'منشوراتي';
        document.getElementById('p-box').style.display = m=='public'?'block':'none';
        document.getElementById('n-home').classList.toggle('active', m=='public');
        document.getElementById('n-user').classList.toggle('active', m=='private');
        load();
    }

    function post() {
        const t = document.getElementById('p-txt').value;
        if(!t.trim()) return;
        db.collection("posts").add({
            name: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
            uid: auth.currentUser.uid,
            text: t,
            time: Date.now(),
            likes: [],
            coms: []
        }).then(()=>document.getElementById('p-txt').value="");
    }

    async function doLike(id) {
        const r = db.collection("posts").doc(id), d = await r.get(), l = d.data().likes||[];
        if(l.includes(auth.currentUser.uid)) r.update({likes: firebase.firestore.FieldValue.arrayRemove(auth.currentUser.uid)});
        else r.update({likes: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)});
    }

    async function doCom(id) {
        const i = document.getElementById('in-'+id), v = i.value;
        if(!v.trim()) return;
        await db.collection("posts").doc(id).update({
            coms: firebase.firestore.FieldValue.arrayUnion({u: auth.currentUser.displayName || "مستخدم", t: v})
        });
        i.value="";
    }

function load() {
        let q = db.collection("posts").orderBy("time", "desc");
        if(mode=='private') q = q.where("uid", "==", auth.currentUser.uid);
        
        q.onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const p = doc.data(), id = doc.id;
                // التأكد من جلب التعليقات سواء كانت بالاسم القديم أو الجديد
                const commentsList = p.coms || p.comments || [];
                
                h += `<div class="post-card">
                    <div class="u-info"><i class="fa-solid fa-user-circle"></i> ${p.name}</div>
                    <div style="font-size:15px; margin-bottom:10px">${p.text}</div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="doLike('${id}')" style="width:auto; background:none; color:#007bff; border:1px solid #007bff; padding:4px 12px; font-size:12px; border-radius:20px">
                            ❤️ ${(p.likes||[]).length} أعجبني
                        </button>
                    </div>

                    <div class="comm-sec">
                        <div id="comments-container-${id}">
                            ${commentsList.map(c => `
                                <div style="font-size:12px; margin-bottom:5px; border-bottom: 1px solid #eee; padding-bottom: 3px;">
                                    <b style="color:#007bff">${c.u || "مستخدم"}:</b> ${c.t || c.msg}
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="comm-box" style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="in-${id}" placeholder="اكتب رداً..." style="flex:1; padding:8px; border-radius:20px; border:1px solid #ddd; font-size:12px;">
                            <button onclick="doCom('${id}')" style="width:auto; padding:5px 15px; border-radius:20px; font-size:12px; background:var(--grad); color:white; border:none;">رد</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('feed').innerHTML = h || "<p style='text-align:center; color:#999'>لا توجد منشورات</p>";
        });
    }
    </script>
</body>
</html>
